<svg
  xmlns="http://www.w3.org/2000/svg"
  width="2360"
  height="1488"
  viewBox="0 0 2360 1488"
  fill="none"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Consultation workspace illustration</title>
  <desc id="desc">
    A stylized illustration of the consultation view with a document on the
    left and a conversation panel on the right.
  </desc>
  <defs>
    <filter
      id="soft-shadow"
      x="-10%"
      y="-10%"
      width="120%"
      height="120%"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow
        dx="0"
        dy="18"
        stdDeviation="20"
        flood-color="#112321"
        flood-opacity="0.08"
      />
    </filter>
    <style>
      .bg { fill: #f7fbfa; }
      .header { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #d7e4e0; stroke-width: 3; }
      .doc-line { fill: #324843; }
      .doc-soft { fill: #dbe5e2; }
      .accent { fill: #00857e; }
      .accent-soft { fill: #d9efec; }
      .chip { fill: #f0f4f3; }
      .muted { fill: #9eb1ac; }
      .jp {
        font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
        fill: #324843;
      }
      .brand-text {
        font-size: 52px;
        font-weight: 700;
      }
      .nav-text {
        font-size: 28px;
        font-weight: 500;
      }
      .title-text {
        font-size: 44px;
        font-weight: 700;
      }
      .body-text {
        font-size: 32px;
        font-weight: 500;
      }
      .small-text {
        font-size: 24px;
        font-weight: 500;
        fill: #8fa29d;
      }
      .panel-title {
        font-size: 42px;
        font-weight: 700;
      }
      .panel-body {
        font-size: 31px;
        font-weight: 500;
      }
      .input-text {
        font-size: 28px;
        font-weight: 500;
        fill: #7f928d;
      }
    </style>
  </defs>

  <rect class="bg" width="2360" height="1488" rx="32" />

  <g filter="url(#soft-shadow)">
    <rect class="header" width="2360" height="108" />
  </g>

  <rect x="64" y="42" width="34" height="5" rx="2.5" fill="#6e7d79" />
  <rect x="64" y="57" width="34" height="5" rx="2.5" fill="#6e7d79" />
  <rect x="64" y="72" width="34" height="5" rx="2.5" fill="#6e7d79" />

  <circle cx="141" cy="58" r="16" stroke="#00857e" stroke-width="6" />
  <circle cx="171" cy="77" r="16" stroke="#00857e" stroke-width="6" />
  <circle cx="201" cy="58" r="16" stroke="#00857e" stroke-width="6" />
  <path
    d="M156 58C164 58 164 77 171 77C178 77 178 58 186 58"
    stroke="#00857e"
    stroke-width="6"
    stroke-linecap="round"
  />
  <text class="jp brand-text" x="229" y="73">校正さん</text>

  <g filter="url(#soft-shadow)">
    <rect class="panel" x="92" y="154" width="1368" height="1186" rx="30" />
    <rect class="panel" x="1536" y="176" width="708" height="164" rx="26" />
  </g>

  <line x1="176" y1="154" x2="176" y2="1340" stroke="#d4e3df" stroke-width="3" />

  <text class="jp nav-text" x="128" y="210">入力ミス</text>
  <text class="jp nav-text" x="128" y="252">半角カナ</text>
  <text class="jp nav-text" x="128" y="294">表記ゆれ</text>
  <text class="jp nav-text" x="128" y="336">漢字の誤変換</text>

  <circle cx="160" cy="370" r="18" fill="#d9efec" />
  <rect x="210" y="358" width="32" height="32" rx="16" fill="#d9efec" />
  <text class="jp title-text" x="128" y="432">まずはそのまま書く</text>
  <text class="jp body-text" x="128" y="478">メモ帳のように文章を書いたら、そのまま校正できます。</text>

  <rect x="128" y="564" width="28" height="28" rx="14" fill="#d9efec" />
  <text class="jp title-text" x="128" y="638">校正結果を見る</text>
  <text class="jp body-text" x="128" y="684">理由まで確認できます。</text>

  <g filter="url(#soft-shadow)">
    <rect
      x="154"
      y="530"
      width="1030"
      height="222"
      rx="26"
      fill="#ffffff"
      stroke="#00857e"
      stroke-width="9"
    />
  </g>
  <text class="jp title-text" x="246" y="622">「考え方」がやや抽象的です。</text>
  <text class="jp body-text" x="246" y="674">修正前: 見直しの考え方まで確認できます。</text>
  <path
    d="M1076 632L1100 656L1128 616"
    stroke="#7b8b87"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <circle cx="160" cy="790" r="18" fill="#d9efec" />
  <text class="jp title-text" x="128" y="856">文章全体を見ながら相談できる</text>
  <text class="jp body-text" x="128" y="902">校正結果から、意図や伝わり方まで確認できます。</text>

  <circle cx="160" cy="1020" r="18" fill="#d9efec" />
  <text class="jp title-text" x="128" y="1086">理由をその場で聞けます</text>
  <text class="jp body-text" x="128" y="1132">伝わり方や文体も相談できます。</text>
  <text class="jp small-text" x="128" y="1178">自分の表現を残したまま見直せます。</text>

  <rect x="1578" y="222" width="118" height="36" rx="18" class="chip" />
  <text class="jp nav-text" x="1590" y="247">1242文字</text>
  <circle cx="2050" cy="238" r="18" fill="#7a8a86" />
  <rect x="2124" y="216" width="24" height="38" rx="5" stroke="#7a8a86" stroke-width="6" />
  <rect x="2210" y="216" width="24" height="38" rx="5" fill="#7a8a86" />

  <g filter="url(#soft-shadow)">
    <rect
      x="1536"
      y="380"
      width="708"
      height="878"
      rx="28"
      fill="#ffffff"
      stroke="#00857e"
      stroke-width="9"
    />
  </g>

  <text class="jp panel-title" x="1602" y="486">文章 全体 校閲 対話</text>
  <circle cx="2058" cy="482" r="16" fill="#7a8a86" />
  <circle cx="2128" cy="482" r="16" fill="#7a8a86" />

  <text class="jp panel-title" x="1602" y="582">気になった理由</text>
  <text class="jp panel-body" x="1602" y="630">言いたいことは合っています。</text>
  <text class="jp panel-body" x="1602" y="674">ただ、ここだけ少し説明的です。</text>

  <text class="jp panel-title" x="1602" y="862">修正案</text>

  <circle cx="1630" cy="922" r="9" fill="#6d7d79" />
  <text class="jp panel-body" x="1662" y="926">AIらしい書き換えに寄せすぎず、</text>
  <text class="jp panel-body" x="1662" y="970">表現を残したまま見直せます。</text>

  <circle cx="1630" cy="1068" r="9" fill="#6d7d79" />
  <text class="jp panel-body" x="1662" y="1072">必要なところだけ前に進めます。</text>

  <text class="jp small-text" x="1602" y="1188">この方向で十分通じます。</text>

  <rect
    x="1602"
    y="1230"
    width="524"
    height="84"
    rx="42"
    fill="#ffffff"
    stroke="#e0e9e6"
    stroke-width="4"
  />
  <path
    d="M1662 1258V1288M1648 1272H1676"
    stroke="#202826"
    stroke-width="5"
    stroke-linecap="round"
  />
  <text class="jp input-text" x="1710" y="1278">校正さんに相談する</text>
  <circle cx="2142" cy="1272" r="36" fill="#101515" />
  <path
    d="M2142 1254V1290M2124 1272H2160"
    stroke="#ffffff"
    stroke-width="5"
    stroke-linecap="round"
  />
</svg>
