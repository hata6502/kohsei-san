<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1280"
  height="720"
  viewBox="0 0 1280 720"
  fill="none"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Proofreading workspace illustration</title>
  <desc id="desc">
    A simplified illustration of the proofreading app with a text workspace,
    correction markers, and a helper panel.
  </desc>
  <defs>
    <filter
      id="soft-shadow"
      x="-10%"
      y="-10%"
      width="120%"
      height="120%"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow
        dx="0"
        dy="14"
        stdDeviation="16"
        flood-color="#142623"
        flood-opacity="0.08"
      />
    </filter>
    <style>
      .bg { fill: #f7fbfa; }
      .header { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #d7e4e0; stroke-width: 2; }
      .ink { fill: #294440; }
      .muted { fill: #9fb1ac; }
      .soft { fill: #e7f4f2; }
      .line { fill: #dbe5e2; }
      .accent { fill: #00857e; }
      .accent-soft { fill: #d8efec; }
      .chip { fill: #ef8e99; }
      .toolbar { fill: #f5f8f8; }
      .jp {
        font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
        fill: #314743;
      }
      .brand-text {
        font-size: 15px;
        font-weight: 700;
      }
      .notice-text {
        font-size: 15px;
        font-weight: 500;
      }
      .body-text {
        font-size: 18px;
        font-weight: 500;
      }
      .caption-text {
        font-size: 15px;
        font-weight: 500;
        fill: #91a29d;
      }
      .side-text {
        font-size: 13px;
        font-weight: 500;
      }
      .button-text {
        font-size: 14px;
        font-weight: 500;
      }
    </style>
  </defs>

  <rect class="bg" width="1280" height="720" rx="24" />

  <g filter="url(#soft-shadow)">
    <rect class="header" width="1280" height="68" />
  </g>

  <rect x="36" y="27" width="19" height="3.5" rx="1.75" fill="#6b7c78" />
  <rect x="36" y="35.5" width="19" height="3.5" rx="1.75" fill="#6b7c78" />
  <rect x="36" y="44" width="19" height="3.5" rx="1.75" fill="#6b7c78" />

  <circle cx="76" cy="34" r="8.5" stroke="#00857e" stroke-width="3.5" />
  <circle cx="92" cy="44" r="8.5" stroke="#00857e" stroke-width="3.5" />
  <circle cx="108" cy="34" r="8.5" stroke="#00857e" stroke-width="3.5" />
  <path
    d="M84 34C88 34 88 44 92 44C96 44 96 34 100 34"
    stroke="#00857e"
    stroke-width="3.5"
    stroke-linecap="round"
  />
  <text class="jp brand-text" x="124" y="41">校正さん</text>

  <g filter="url(#soft-shadow)">
    <rect class="panel" x="64" y="102" width="766" height="496" rx="24" />
    <rect class="panel" x="846" y="102" width="370" height="104" rx="20" />
    <rect class="panel" x="846" y="228" width="370" height="368" rx="20" />
  </g>

  <rect class="soft" x="88" y="126" width="718" height="58" rx="12" />
  <circle cx="118" cy="155" r="12" fill="#ffffff" stroke="#94c9c3" stroke-width="3" />
  <text class="jp notice-text" x="142" y="160">6件の見直し箇所があります</text>

  <rect x="88" y="198" width="718" height="374" rx="18" fill="#ffffff" stroke="#c8d8d3" stroke-width="2" />

  <text class="jp body-text" x="106" y="242">誤字脱字をチェックしたり、言い回しを整えます。</text>
  <rect x="490" y="219" width="18" height="18" rx="4" class="chip" />
  <rect x="492" y="224" width="6" height="8" rx="2" fill="#ffffff" opacity="0.95" />

  <text class="jp caption-text" x="106" y="267">冗長な表現を見直すこともできます。</text>

  <text class="jp body-text" x="106" y="308">入力ミスチェック　入力mス</text>
  <rect x="266" y="285" width="18" height="18" rx="4" class="chip" />
  <rect x="268" y="290" width="6" height="8" rx="2" fill="#ffffff" opacity="0.95" />

  <text class="jp body-text" x="106" y="374">半角カナチェック　半角ｶﾅ</text>
  <rect x="280" y="350" width="18" height="18" rx="4" class="chip" />
  <rect x="282" y="355" width="6" height="8" rx="2" fill="#ffffff" opacity="0.95" />

  <text class="jp body-text" x="106" y="440">表記ゆれチェック　テレビジョンとテレビ</text>
  <rect x="285" y="416" width="18" height="18" rx="4" class="chip" />
  <rect x="287" y="421" width="6" height="8" rx="2" fill="#ffffff" opacity="0.95" />

  <text class="jp body-text" x="106" y="506">漢字チェック　溌剌（はつらつ）</text>
  <rect x="217" y="483" width="18" height="18" rx="4" class="chip" />
  <rect x="239" y="483" width="18" height="18" rx="4" class="chip" />
  <rect x="219" y="488" width="6" height="8" rx="2" fill="#ffffff" opacity="0.95" />
  <rect x="241" y="488" width="6" height="8" rx="2" fill="#ffffff" opacity="0.95" />

  <rect x="106" y="321" width="212" height="10" rx="5" class="line" />
  <rect x="106" y="386" width="176" height="10" rx="5" class="line" />
  <rect x="106" y="452" width="208" height="10" rx="5" class="line" />
  <rect x="106" y="518" width="182" height="10" rx="5" class="line" />

  <rect class="toolbar" x="874" y="130" width="82" height="32" rx="16" />
  <text class="jp side-text" x="886" y="151">125文字</text>
  <rect x="1068" y="130" width="17" height="17" rx="4" fill="#7e8d89" />
  <rect x="1110" y="130" width="17" height="24" rx="4" stroke="#7e8d89" stroke-width="4" />
  <rect x="1154" y="130" width="17" height="24" rx="4" fill="#7e8d89" />

  <rect x="874" y="256" width="314" height="44" rx="12" fill="#ffffff" stroke="#86cbc4" stroke-width="2.5" />
  <text class="jp button-text" x="947" y="284">校正さんに相談（ベータ版）</text>
  <text class="jp side-text" x="874" y="333">AIサーバーに情報を送信・保持します</text>
  <text class="jp side-text" x="874" y="360">ベータ版のため、性能や品質について</text>
  <text class="jp side-text" x="874" y="387">保証はなく、一切の責任を負いません</text>
  <text class="jp side-text" x="874" y="414">Privacy Policy と Terms of Service</text>

  <text class="jp body-text" x="874" y="476">プライバシー設定</text>
  <rect x="874" y="492" width="206" height="12" rx="6" fill="#a1b3af" />
  <rect x="874" y="520" width="240" height="12" rx="6" fill="#a1b3af" />
  <rect x="874" y="548" width="174" height="12" rx="6" fill="#a1b3af" />

  <circle cx="1204" cy="559" r="8" fill="#0f1514" />
  <path
    d="M1204 553V565M1198 559H1210"
    stroke="#ffffff"
    stroke-width="2.5"
    stroke-linecap="round"
  />
</svg>
